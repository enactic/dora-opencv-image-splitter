nodes:
  - id: camera
    build: pip install dora-openarm-dummy-camera
    path: dora-openarm-dummy-camera
    env:
      ENCODING: "jpeg"
      IMAGE_HEIGHT: 600
      IMAGE_WIDTH: 960
      JPEG_QUALITY: 90
    inputs:
      tick: dora/timer/millis/33 # 30fps
    outputs:
      - image

  - id: splitter
    build: pip install -e ..
    path: dora-opencv-image-splitter
    inputs:
      image: camera/image
    outputs:
      - image_0
      - image_1

  - id: plot
    build: pip install opencv-plot
    path: opencv-plot
    env:
      PLOT_HEIGHT: 600
      PLOT_WIDTH: 960
    inputs:
      image: camera/image

  - id: plot0
    build: pip install opencv-plot
    path: opencv-plot
    env:
      PLOT_HEIGHT: 600
      PLOT_WIDTH: 480
    inputs:
      image: splitter/image_0

  - id: plot1
    build: pip install opencv-plot
    path: opencv-plot
    env:
      PLOT_HEIGHT: 600
      PLOT_WIDTH: 480
    inputs:
      image: splitter/image_1
